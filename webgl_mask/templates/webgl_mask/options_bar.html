<!-- WebGL Options Bar (integrated sub-toolbar style) -->
<div id="webgl-options-bar" class="options-bar hidden">
  <div class="options-divider"></div>
  <div class="options-group">
    <div class="options-group-header">WebGL Masks</div>
    <div class="options-group-controls">
      <span class="options-label">Reveal Strength</span>
      <input type="range" id="edge-subtract" min="0" max="255" step="1" value="255" title="Adjust mask opacity to reveal redacted content">
    </div>
  </div>
</div>
