
<!-- Embedded Text Viewer Sub-toolbar -->
    <div id="etv-bar" class="options-bar hidden">
{% if 'text_tool' not in active_plugins %}
      <div class="options-divider"></div>
      <div class="options-group">
        <div class="options-group-header">Display</div>
        <div class="options-group-controls">
          <span class="options-label">Color</span>
          <input type="color" id="etv-color" value="#0064ff" title="Span color">

          <span class="options-label" style="margin-left: 8px;">Opacity</span>
          <input type="range" id="etv-opacity" min="0" max="100" value="85" title="Span opacity">
          <span id="etv-opacity-display" class="options-label">85%</span>
        </div>
      </div>

      <div class="options-divider"></div>

      <div class="options-group">
        <div class="options-group-header">Mode</div>
        <div class="options-group-controls">
          <select id="etv-mode" class="toolbar-select">
            <option value="text">Text Labels</option>
            <option value="boxes">Highlight Boxes</option>
          </select>
        </div>
      </div>
      {% endif %}
    </div>

    <!-- Fabric Options Bar (Formatting Ribbon) — only when text_tool is not providing it -->
    {% if 'text_tool' not in active_plugins %}
    <div id="fabric-options-bar" class="options-bar hidden">
      <div class="options-divider"></div>

      <div class="options-group">
        <div class="options-group-header">Add</div>
        <div class="options-group-controls">
          <button id="etv-add-text-btn" class="icon-button" title="Add New Text (click on page)">
            <span class="material-symbols-outlined">text_fields</span>
          </button>
          <button id="tool-add-box" class="icon-button" title="Add Redaction to Line (click on page)">
            <span class="material-symbols-outlined">add_box</span>
          </button>
        </div>
      </div>

      <div class="options-divider"></div>
      
      <div class="options-group">
        <div class="options-group-header">Font</div>
        <div class="options-group-controls">
          <select id="fabric-font-family" class="toolbar-select">
            <option value="Arial">Arial</option>
            <option value="Calibri">Calibri</option>
            <option value="Courier New">Courier New</option>
            <option value="Segoe UI">Segoe UI</option>
            <option value="Times New Roman" selected>Times New Roman</option>
            <option value="Verdana">Verdana</option>
          </select>
          <input type="number" id="fabric-font-size" value="12" min="1" max="400" step="0.05" title="Font size (pt)" class="toolbar-input-small" style="width: 72px;">
          <span class="options-label">pt</span>
        </div>
      </div>

      <div class="options-divider"></div>

      <div class="options-group">
        <div class="options-group-header">Style</div>
        <div class="options-group-controls">
          <button id="fabric-bold"          class="icon-button options-toggle" title="Bold"><b style="font-family:serif;">B</b></button>
          <button id="fabric-italic"        class="icon-button options-toggle" title="Italic"><em style="font-family:serif;">I</em></button>
          <button id="fabric-underline"     class="icon-button options-toggle" title="Underline"><u style="font-family:serif;">U</u></button>
          <button id="fabric-strikethrough" class="icon-button options-toggle" title="Strikethrough"><s style="font-family:serif;">S</s></button>
          
          <input type="color" id="fabric-color" value="#000000" title="Text color" style="margin-left: 4px;">
        </div>
      </div>

      <div class="options-divider"></div>

      <div class="options-group">
        <div class="options-group-header">Spacing</div>
        <div class="options-group-controls">
          <input type="number" id="fabric-letter-spacing" value="0" min="-0.5" max="2" step="0.01" title="Letter spacing (em)" class="toolbar-input-small">
          <span class="options-label">em</span>
          <span class="options-divider" style="height: 20px; margin: 0 8px;"></span>
          <label style="font-size:12px; display:flex; align-items:center; gap:3px; color:#bdc1c6; cursor:pointer;" title="When checked, use the font's native space width. Uncheck for manual control.">
            <input type="checkbox" id="fabric-default-sw" checked> Default
          </label>
          <span class="options-divider" style="height: 20px; margin: 0 8px;"></span>
          <span class="options-label">Space W.</span>
          <input type="range" id="fabric-space-width" min="1" max="20" step="0.1" value="4" title="Space width (px)" style="width: 60px;">
          <span id="fabric-space-width-display" class="options-label">4px</span>
        </div>
      </div>
    </div>
    {% endif %}
