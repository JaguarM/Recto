
<!-- Auto OCR Sub-toolbar -->
    <div id="ocr-tool-bar" class="options-bar hidden">
      <div class="options-divider"></div>
      <div class="options-group">
        <div class="options-group-header">Auto OCR</div>
        <div class="options-group-controls">
          <button id="ocr-run-page" class="icon-button" title="Read this page — byte-exact blind reader">
            <span class="material-symbols-outlined">play_arrow</span>
          </button>
          <button id="ocr-run-all" class="icon-button" title="Read all pages">
            <span class="material-symbols-outlined">playlist_play</span>
          </button>
          <button id="ocr-toggle-text" class="icon-button active" title="Toggle OCR Text">
            <span class="material-symbols-outlined">visibility</span>
          </button>
          <button id="ocr-cancel" class="icon-button hidden" title="Stop after the current page">
            <span class="material-symbols-outlined">stop</span>
          </button>
        </div>
      </div>

      <div class="options-divider"></div>

      <div class="options-group">
        <div class="options-group-header">Result</div>
        <div class="options-group-controls">
          <span id="ocr-status" class="options-label">idle</span>
        </div>
      </div>
    </div>
