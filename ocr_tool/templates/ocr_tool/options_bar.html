
<!-- Auto OCR Sub-toolbar -->
    <div id="ocr-tool-bar" class="options-bar hidden">
      <div class="options-divider"></div>
      <div class="options-group">
        <div class="options-group-header">Read</div>
        <div class="options-group-controls">
          <button id="ocr-run-page" class="ocr-run-btn" title="Read the current page with the blind reader">This page</button>
          <button id="ocr-run-all" class="ocr-run-btn" title="Read every page of the document">All pages</button>
          <button id="ocr-cancel" class="ocr-run-btn hidden" title="Stop after the current page">Cancel</button>
        </div>
      </div>

      <div class="options-divider"></div>

      <div class="options-group">
        <div class="options-group-header">Result</div>
        <div class="options-group-controls">
          <span id="ocr-status" class="options-label">Byte-exact OCR of the page raster — text lands as editable boxes.</span>
        </div>
      </div>
    </div>
