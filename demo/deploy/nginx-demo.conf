# nginx site config for the Recto demo on a small VPS.
#
# Sample traffic (almost all traffic) is served straight from disk — the
# pre-rendered pages, the engine, the glyphs. Python (gunicorn) only sees
# the landing page and the rare user upload.
#
# Adjust /srv/recto to wherever the repo is checked out, then:
#   sudo ln -s /etc/nginx/sites-available/recto-demo /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites on the server (one-time, and after changing samples):
#   python demo/manage.py prerender_samples
#   python demo/manage.py collectstatic --noinput   (STATIC_ROOT below)

server {
    listen 80;
    server_name demo.example.com;   # ← your domain

    client_max_body_size 50m;       # matches Django's upload cap

    gzip on;
    gzip_types application/json application/javascript text/css text/plain application/octet-stream;
    gzip_min_length 1024;

    # Pre-rendered sample pages: immutable (URLs carry ?v=<sha>) ...
    location /prerendered/ {
        alias /srv/recto/demo/prerendered/;
        expires max;
        add_header Cache-Control "public, immutable";
    }
    # ... except meta.json, which must revalidate when a sample is replaced.
    location ~ ^/prerendered/(?<rest>.+/meta\.json)$ {
        alias /srv/recto/demo/prerendered/$rest;
        add_header Cache-Control "no-cache";
    }

    # Static files incl. the OCR engine and the ~10 MB glyph pack.
    # Run `python demo/manage.py collectstatic` after deploys.
    location /static/ {
        alias /srv/recto/demo/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else (landing page, uploads, per-page rasters of uploads).
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
