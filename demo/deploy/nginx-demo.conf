# nginx site for the Recto demo at demo.unbarpdf.com — lives alongside the
# main unbarpdf.com site on the same box.
#   sudo cp demo/deploy/nginx-demo.conf /etc/nginx/sites-available/recto-demo
#   sudo ln -sf /etc/nginx/sites-available/recto-demo /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Sample traffic (almost all traffic) is served straight from disk — the
# pre-rendered pages, the engine, the glyphs. Python (gunicorn on :8001)
# only sees the landing page and the rare user upload.
#
# Prerequisites (one-time, and after changing samples / pulling updates):
#   cd /var/www/recto && source venv/bin/activate
#   python demo/manage.py prerender_samples
#   python demo/manage.py collectstatic --noinput

server {
    listen 80;
    server_name demo.unbarpdf.com;

    client_max_body_size 50m;       # matches Django's upload cap

    gzip on;
    gzip_types application/json application/javascript text/css text/plain application/octet-stream;
    gzip_min_length 1024;

    # Pre-rendered sample pages: immutable (URLs carry ?v=<sha>) ...
    location /prerendered/ {
        alias /var/www/recto/demo/prerendered/;
        expires max;
        add_header Cache-Control "public, immutable";
    }
    # ... except meta.json, which must revalidate when a sample is replaced.
    location ~ ^/prerendered/(?<rest>.+/meta\.json)$ {
        alias /var/www/recto/demo/prerendered/$rest;
        add_header Cache-Control "no-cache";
    }

    # Static files incl. the OCR engine and the ~10 MB glyph pack.
    location /static/ {
        alias /var/www/recto/demo/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else (landing page, uploads, per-page rasters of uploads).
    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 120s;
    }
}
